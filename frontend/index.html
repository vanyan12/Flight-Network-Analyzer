<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Flight Network UI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>

  <style>
    body { margin:0; font-family: system-ui, Arial; height:100vh; display:flex; }
    #panel { width:350px; padding:12px; border-right:1px solid #ddd; box-sizing:border-box; overflow:auto; }
    #sidebar { scrollbar-width:none; -ms-overflow-style:none; }
    #sidebar::-webkit-scrollbar { width:0; height:0; display:none; }
    #map { flex:1; }
    #out { background:#f6f6f6; color:#222; border:1px solid transparent; padding:8px; border-radius:8px; min-height:3.2em; max-height:8.5em; line-height:1.4; margin:0; box-sizing:border-box; overflow-y:auto; overflow-x:hidden; white-space:pre-wrap; overflow-wrap:anywhere; }
    #sidebar.results-hidden #out { min-height:4.8em; max-height:12em; }
    #out.is-error { color:#a61b1b; background:#ffe3e3; border-color:#f2b8b8; }
      #out.is-success { color:#166534; background:#dcfce7; border-color:#86efac; }
    h3 { margin: 6px 0 12px; }
    h4 { margin: 14px 0 8px; }
    label { display:block; margin-top:10px; font-size: 13px; color:#444; }
    select, input, button { width:100%; padding:8px; margin-top:5px; box-sizing:border-box; }
    .row { display:flex; gap:8px; }
    .row button { flex:1; }
    .row > * { flex:1; }
    .field-row { display:flex; gap:8px; margin-top:10px; }
    .field-group { flex:1; min-width:0; }
    .field-group label { margin-top:0; }
    .muted { color:#666; font-size: 12px; }
    #kValidation { display:none; color:#a61b1b; background:#ffe3e3; border:1px solid #f2b8b8; border-radius:6px; padding:8px 10px; margin-top:6px; font-size:12px; font-weight:600; box-sizing:border-box; }
    #kValidation.is-visible { display:block; }
    .result-box { background:#f6f6f6; padding:10px; border-radius:8px; min-height:42px; overflow:auto; white-space:pre-wrap; word-break:break-word; }
    #resultTotal { min-height:28px; padding:8px 10px; }
    .result-section { display:block; }
    #sidebar.results-hidden .result-section { display:none; }

  </style>
</head>

<body>
  <div id="sidebar" style="width:250px; padding:12px; border-right:1px solid #ddd; box-sizing:border-box; overflow:auto; display:block; position:relative; z-index:1000; background:#fff;">
    <h3>Flight Network</h3>

    <button id="btnLoad">Load airports</button>

    <div class="field-row">
      <div class="field-group">
        <label>Source</label>
        <select id="src"></select>
      </div>
      <div class="field-group">
        <label>Destination</label>
        <select id="dst"></select>
      </div>
    </div>
      
    <label>Dijkstra</label>
    <div class="row">
      <button id="btnCheapest" disabled>Cheapest</button>
      <button id="btnFastest" disabled>Fastest</button>
    </div>

    <label>K connections (BFS)</label>
    <input id="k" type="number" value="2" min="0" max="10"/>
    <div id="kValidation" class="muted" aria-live="polite"></div>
    <button id="btnReach" disabled>Reachable within K</button>

    <button id="btnArt" disabled>Articulation points</button>

    <label>MST weight</label>
    <select id="mstWeight">
      <option value="">Select MST weight</option>
      <option value="cost">Cost</option>
      <option value="duration">Duration</option>
      <option value="distance">Distance</option>
    </select>

    <button id="mst" disabled>Minimum Spanning Tree</button>

    <h4>Message</h4>
    <pre id="out"></pre>

    <div class="result-section">
      <h4 id="resultTotalLabel">Total</h4>
      <div id="resultTotal" class="result-box">No result yet.</div>
    </div>

    <div class="result-section">
      <h4>Path</h4>
      <div id="resultPath" class="result-box">No result yet.</div>
    </div>
  </div>

  <div id="map"></div>

  <script src="app.js"></script>
</body>
</html>
